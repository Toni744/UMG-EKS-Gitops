---
apiVersion: v1
kind: Namespace
metadata:
  name: app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: app
data:
  app_name: "umgapi-app"
  log_level: "INFO"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: umgapi-app
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: umgapi-app
  template:
    metadata:
      labels:
        app: umgapi-app
    spec:
      containers:
      - name: umgapi-app
        image: 014772274523.dkr.ecr.us-east-1.amazonaws.com/umgapi-app:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: app_name
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log_level
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: umgapi-app
  namespace: app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: umgapi-app
