name: Build and Push to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/ci.yaml'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 014772274523.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: umgapi-app

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint bandit
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Lint with pylint
        run: |
          pylint app/app.py --fail-under=8.0 || echo "Pylint warnings found"

      - name: Security scan with Bandit
        run: |
          bandit -r app --format json --output bandit-report.json || true
          bandit -r app --severity-level high

  build-and-push:
    needs: lint-and-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate semantic version
        id: version
        run: |
          # Use the format: vX.Y.Z-<short-commit-hash>
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="v1.0.0-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          cd app
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

