apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: umgapi-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Toni744/UMG-EKS-Gitops
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
